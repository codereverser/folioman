name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python (lint + test)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.13"
          enable-cache: true

      # Fail if uv.lock is out of sync with the pyproject manifests. Catches a
      # lockfile edited in isolation (e.g. a Dependabot bump that rewrote the lock
      # past a pinned constraint without updating pyproject) before it merges.
      - name: Verify lockfile is in sync
        run: uv lock --check

      - name: Sync workspace
        run: uv sync

      - name: Lint (ruff)
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Test (pytest)
        run: uv run pytest --cov --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml

  frontend:
    name: Frontend (test + build)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      # pnpm version comes from the packageManager field in package.json.
      - uses: pnpm/action-setup@v6.0.8
        with:
          package_json_file: frontend/package.json

      - uses: actions/setup-node@v6
        with:
          node-version-file: frontend/.nvmrc
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Format check (prettier)
        working-directory: frontend
        run: pnpm format:check

      - name: Test (vitest)
        working-directory: frontend
        run: pnpm test

      # The Codecov vite plugin uploads bundle-size stats during the build
      # when CODECOV_TOKEN is present; without it (forks) the plugin no-ops
      # and the build still verifies the frontend compiles.
      - name: Build (uploads bundle stats to Codecov)
        working-directory: frontend
        run: pnpm build
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
