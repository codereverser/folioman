# Dependabot version updates.
#
# A `cooldown` is set so Dependabot waits before opening update PRs for a
# freshly published release. This mirrors the install-time supply-chain
# cool-down enforced at `pnpm install` (minimumReleaseAge): a newly published
# package — direct or pulled in transitively when the lockfile is recomputed —
# is the prime window for a compromised release to be caught and yanked, so we
# let releases age before adopting them.
#
# Note: for npm the cooldown gates the dependency being updated, which in turn
# delays lockfile recomputation and gives transitive deps time to age. The
# install-time guard remains the hard guarantee. For the `uv` ecosystem the
# cooldown is currently best-effort upstream (dependabot-core #13631, #14544).
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 5
    # Keep @types/node matched to the runtime Node major (pinned to 24 LTS via
    # .nvmrc/engines). Its major tracks the Node major, so a major bump would pull
    # in types for a Node we don't run. Take minor/patch; ignore majors until we
    # move the runtime to the next LTS (Node 26), then bump this in lockstep.
    ignore:
      - dependency-name: "@types/node"
        update-types:
          - "version-update:semver-major"
    # Batch every non-major update into ONE PR per run instead of one-per-package
    # — the bulk of the noise. Majors stay ungrouped (their own PR each) so a risky
    # bump is reviewed and merged on its own without blocking the batch.
    groups:
      minor-and-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 5
    # Stay on the Django LTS line. 5.2 is LTS (supported into 2028); 6.0/6.1 are
    # non-LTS (~16-month support). Take patch updates (5.2.x security fixes) but
    # ignore minor/major bumps so Dependabot never proposes a non-LTS Django. When
    # the next LTS (6.2) lands and we're ready, bump the pin in app/pyproject.toml
    # (>=5.2,<5.3 → >=6.2,<6.3) and adjust this rule then.
    ignore:
      - dependency-name: "django"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
    groups:
      minor-and-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      minor-and-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
