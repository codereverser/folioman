# pnpm: allow these deps to run install/build scripts.
# esbuild + vue-demi for Vite, sharp for the PWA icon generator.
allowBuilds:
  esbuild: true
  sharp: true
  vue-demi: true

# Force the patched js-yaml past a transitive DoS (GHSA merge-key quadratic blowup).
# openapi-typescript's @redocly/openapi-core pins js-yaml at 4.1.1 exactly, so the only
# way up is an override; 4.2.0 is API-compatible. Drop this once redocly bumps it.
overrides:
  js-yaml: 4.2.0
